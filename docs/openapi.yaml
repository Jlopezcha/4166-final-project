openapi: 3.1.0

info:
  title: Task API
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
  # - url: 
  #   description: Production Server

tags:
  - name: Auth
    description: User authentication endpoints
  - name: Tech
    description: Technology endpoints
  

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example:
                  accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Invalid credentials'

  /auth/signup:
    post:
      tags:
        - Auth
      summary: Register user
      description: Create a new user account
      requestBody:
        description: User signup credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '201':
          description: Sign up successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          description: Duplicate Email
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: Email has already been used 

  /technology:
    get:
      tags:
        - Tech
      summary: Get all technologies
      description: Retrieve a list of all technologies
      responses:
        '200':
          description: A list of technologies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Technology'
    post:
      summary: Create a new technology item
      tags:
        - Tech
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Technology'
      responses:
        '201':
          description: Technology created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Technology'
        '400':
          description: Bad request due to invalid data
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                example:
                  errors:
                    - 'Product name must be at least 4 characters'

  /technology/{id}:
    get:
      tags:
        - Tech
      summary: Get a technology by ID
      description: Retrieve a single technology by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: A single technology product with its contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Technology'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/InvalidId'
    put:
      security:
        - bearerAuth: []
      tags:
        - Tech
      summary: Update a post by ID
      description: Update a single blog post by its ID
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        description: Fields to update for the post. At least one of "title" or "content" must be provided.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Technology'
      responses:
        '200':
          description: Post updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Technology'
        '400':
          description: Bad request due to invalid input or invalid ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                example:
                  errors: ["ID must be a positive integer", "Title must be at least 3 characters"]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden' 
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Tech
      summary: Delete a tech by ID
      description: Delete a single tech post by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Tech deleted successfully
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'





components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: Alice
        email:
          type: string
          readOnly: true
          example: 'test@test.com'
        password:
          type: string
          writeOnly: true
        role:
          type: string
          readOnly: true
          example: 'USER'

    Technology:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        product_name:
          type: string
          example: 'Apple Ipad Air (M4)'
        category:
          type: array
          example: ['entertainment', 'educational']
        availability:
          type: integer
          example: 20
        product_year:
          type: integer
          example: '2025'
        avg_rating:
          type: integer
          example: 8
        total_reviews:
          type: integer
          example: 7
        

    AuthCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: 'user@example.com'
        password: 'password123'

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        example: 1

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example: 
              error: "Resource 1 not found"

    InvalidId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors: ["ID must be a positive integer"]
    
    InvalidPostInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Product name must be at least 4 characters'

    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Not authenticated. Please provide a valid token.'
    
    Forbidden:
      description: Client is not authorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Forbidden: insufficient permission.'

    InvalidUserInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Email is required'
                - 'Password is required'
                   
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT                